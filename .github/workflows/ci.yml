name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Typecheck + Lint + Test
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      DIRECT_URL:   ${{ secrets.TEST_DIRECT_URL }}
      JWT_SECRET:   ${{ secrets.TEST_JWT_SECRET }}
      JWT_REFRESH_SECRET: ${{ secrets.TEST_JWT_REFRESH_SECRET }}
      NODE_ENV:     test
      FRONTEND_URL: http://localhost:5173
      RESEND_API_KEY: re_test_placeholder
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM:  ${{ secrets.TURBO_TEAM }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm build --filter=@clinicaplus/types --filter=@clinicaplus/utils

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Run tests
        run: pnpm test --run --filter=api

  migrate-and-deploy:
    name: Migrate + Deploy
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
      DIRECT_URL:   ${{ secrets.PROD_DIRECT_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run database migrations
        run: pnpm --filter=api exec prisma migrate deploy

      # Railway and Vercel deploy automatically via their GitHub integrations
      # after this job succeeds
