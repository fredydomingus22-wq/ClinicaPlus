name: PR Check

on:
  pull_request:
    branches: [main]

jobs:
  check:
    name: Fast Check (Typecheck + Lint + Unit Tests)
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      JWT_SECRET: dummy-secret-for-typechecking
      JWT_REFRESH_SECRET: dummy-refresh-secret-for-typechecking
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM:  ${{ secrets.TURBO_TEAM }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm build --filter=@clinicaplus/types --filter=@clinicaplus/utils

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Run unit tests
        run: pnpm --filter=api exec vitest run src/__tests__/unit
